<html lang="vi">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Miền Việt Nam</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      .arrow {
        width: 10px;
        height: 10px;
        border-left: 3px solid #fff;
        border-top: 3px solid #fff;
        transform: rotate(45deg);
      }
      .arrow-1 {
        animation: arrowUp 1.4s infinite;
      }
      .arrow-2 {
        animation: arrowUp 1.4s infinite;
        animation-delay: 0.2s;
      }
      #backToTop {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 9999;
        display: none;
      }
      #backToTop a {
        width: 46px;
        height: 46px;
        background: linear-gradient(135deg, #8bc34a, #558b2f);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        border-radius: 8px;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.35);
        text-decoration: none;
        transition: all 0.3s ease;
      }
      #backToTop a:hover {
        transform: translateY(-4px);
        background: linear-gradient(135deg, #9ccc65, #689f38);
      }
      @media (max-width: 850px) {
        .modal-right {
          padding: 16px;
        }
        .modal-content {
          width: 95%;
          height: 90vh;
          max-height: 90vh;
          display: flex;
          flex-direction: column;
        }
        .modal-left {
          height: 200px;
          flex-shrink: 0;
        }
        .modal-right {
          flex: 1;
          overflow-y: auto;
          padding: 20px;
          -webkit-overflow-scrolling: touch;
        }
        #m-title {
          font-size: 1.6rem !important;
        }
        #m-link button {
          margin-top: 15px;
          padding: 16px;
        }
      }
      @media (max-width: 850px) {
        #m-link {
          position: sticky;
          bottom: 0;
        }
      }
      html {
        scroll-behavior: smooth;
      }
      :root {
        --primary: #059669;
        --accent: #10b981;
        --dark: #0f172a;
        --light-bg: #f8fafc;
        --glass: rgba(255, 255, 255, 0.8);
        --radius: 20px;
        --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Plus Jakarta Sans", sans-serif;
      }
      body {
        background-color: var(--light-bg);
        color: var(--dark);
        overflow-x: hidden;
      }
      .hero {
        height: 50vh;
        background:
          linear-gradient(rgba(15, 23, 42, 0.6), rgba(15, 23, 42, 0.4)),
          url("https://images.unsplash.com/photo-1528127269322-539801943592?q=80&w=2000");
        background-size: cover;
        background-position: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
        text-align: center;
        clip-path: ellipse(150% 100% at 50% 0%);
      }
      .hero h1 {
        font-size: clamp(2rem, 6vw, 4rem);
        font-weight: 800;
        letter-spacing: -1px;
      }
      .controls-container {
        max-width: 900px;
        margin: -50px auto 40px;
        padding: 25px;
        background: var(--glass);
        backdrop-filter: blur(20px);
        border-radius: 30px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        z-index: 100;
        position: relative;
        border: 1px solid rgba(255, 255, 255, 0.3);
      }
      .search-box {
        flex: 2;
        min-width: 250px;
        padding: 15px 25px;
        border-radius: 15px;
        border: 1px solid #e2e8f0;
        outline: none;
        font-size: 1rem;
        transition: var(--transition);
      }
      .filter-btn {
        padding: 12px 24px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.4);
        background: white;
        cursor: pointer;
        font-weight: 700;
        color: var(--dark);
        transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        box-shadow:
          0 4px 6px -1px rgba(0, 0, 0, 0.1),
          0 2px 4px -1px rgba(0, 0, 0, 0.06);
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .filter-btn a {
        text-decoration: none;
        color: inherit;
        z-index: 1;
      }
      .filter-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 20px -5px rgba(5, 150, 105, 0.2);
        border-color: var(--primary);
        color: var(--primary);
      }
      .filter-btn.active {
        background: linear-gradient(135deg, var(--dark) 0%, #1e293b 100%);
        color: white !important;
        border: none;
        box-shadow: 0 10px 15px -3px rgba(15, 23, 42, 0.3);
      }
      #m-link button {
        width: 100%;
        margin-top: 30px;
        padding: 20px;
        border-radius: 18px;
        border: none;
        background: #0f172a;
        color: white;
        font-weight: 800;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }
      #m-link button:hover {
        background: var(--primary);
        transform: scale(1.03);
        box-shadow: 0 15px 30px rgba(5, 150, 105, 0.3);
        letter-spacing: 2px;
      }
      #m-link button::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.2),
          transparent
        );
        transition: 0.8s ease;
      }
      .card:active {
        transform: scale(0.98);
      }
      #m-link button:hover::before {
        left: 100%;
      }
      .filter-btn.active a {
        color: white !important;
      }
      .main-content {
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 20px 60px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 30px;
      }
      .card {
        background: white;
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        transition: var(--transition);
        cursor: pointer;
        position: relative;
        animation: fadeIn 0.6s ease forwards;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .card:hover {
        transform: translateY(-10px);
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.12);
      }
      .card-img-wrapper {
        height: 260px;
        overflow: hidden;
        position: relative;
      }
      .card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: 0.8s ease;
      }
      .card:hover img {
        transform: scale(1.1);
      }
      .region-tag {
        position: absolute;
        top: 15px;
        left: 15px;
        padding: 6px 14px;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(5px);
        border-radius: 10px;
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--dark);
      }
      .card-body {
        padding: 25px;
      }
      .card-body h3 {
        font-size: 1.4rem;
        margin-bottom: 8px;
        font-weight: 700;
      }
      .card-body p {
        color: #64748b;
        font-size: 0.95rem;
        line-height: 1.5;
      }
      .modal {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(10px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 2000;
        opacity: 0;
        transition: 0.4s ease;
      }
      .modal.active {
        display: flex;
        opacity: 1;
      }
      .modal-content {
        background: white;
        width: 95%;
        max-width: 1000px;
        max-height: 90vh;
        border-radius: 30px;
        overflow: hidden;
        display: grid;
        grid-template-columns: 1.2fr 1fr;
        position: relative;
        animation: slideUp 0.5s ease;
      }
      .modal-left img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .modal-right {
        padding: 40px;
        overflow-y: auto;
      }
      .highlights {
        margin-top: 25px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .hl-tag {
        padding: 6px 12px;
        background: #f1f5f9;
        border-radius: 8px;
        font-size: 0.85rem;
        color: var(--primary);
        font-weight: 600;
      }
      .close-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 40px;
        height: 40px;
        background: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 10;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }
      @keyframes slideUp {
        from {
          transform: translateY(50px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
      @media (max-width: 850px) {
        .modal-content {
          grid-template-columns: 1fr;
        }
        .modal-left {
          height: 250px;
        }
      }
    </style>
  </head>
  <body>
    <div id="backToTop">
      <a href="#hero" aria-label="Lên đầu trang">
        <span class="arrow arrow-1"></span>
        <span class="arrow arrow-2"></span>
      </a>
    </div>
    <section class="hero" id="hero">

      <p>Hành trình khám phá 34 tỉnh thành rạng rỡ</p>
    </section>
    <div class="controls-container">

        id="searchInput"
        class="search-box"

        data-region="all"

        href="#all"
      >
        Tất cả
      </button>
      <button
        class="filter-btn"
        data-region="Miền Bắc"
        id="btn-mienbac"
        href="#mienbac"
      >
        Miền Bắc
      </button>
      <button
        class="filter-btn"

        Miền Nam
      </button>
    </div>
    <main class="main-content">

    </main>
    <div class="modal" id="modal">
      <div class="modal-content">
        <div class="close-btn" onclick="closeModal()">✕</div>
        <div class="modal-left">

        </div>
        <div class="modal-right">
          <span

              color: var(--primary);
              font-weight: 800;
              font-size: 0.8rem;
              text-transform: uppercase;

          <p id="m-desc" style="color: #475569; line-height: 1.7"></p>
          <a
            id="m-link"
            href="#"
            style="
              color: white;
              text-decoration: none;
              font-weight: 700;
              display: block;
            "
          >
            <button
              style="
                width: 100%;
                margin-top: 30px;
                padding: 18px;
                border-radius: 15px;
                border: none;
                background: var(--dark);
                cursor: pointer;
                color: white;
              "
            >
              Khám phá ngay
            </button>
          </a>
        </div>
      </div>
    </div>

        }

        .getElementById("btn-miennam")

      const grid = document.getElementById("provincesGrid");
      const searchInput = document.getElementById("searchInput");
      let currentFilter = "all";
      function render(data) {
        grid.innerHTML = data
          .map(
            (p) => `
                <div class="card" onclick="openModal(${p.id})">
                    <div class="card-img-wrapper">
                        <span class="region-tag">${p.region}</span>
                        <img src="${p.image}" alt="${p.name}">
                    </div>
                    <div class="card-body">
                        <h3>${p.name}</h3>
                        <p>${p.description.substring(0, 85)}...</p>
                        <div style="margin-top:15px; color:var(--primary); font-weight:700; font-size:0.85rem">XEM CHI TIẾT →</div>
                    </div>
                </div>
            `,
          )
          .join("");
      }
      function removeVietnameseTones(str) {
        str = str.replace(/à|á|ạ|ả|ã|â|ầ|ấ|ậ|ẩ|ẫ|ă|ằ|ắ|ặ|ẳ|ẵ/g, "a");
        str = str.replace(/è|é|ẹ|ẻ|ẽ|ê|ề|ế|ệ|ể|ễ/g, "e");
        str = str.replace(/ì|í|ị|ỉ|ĩ/g, "i");
        str = str.replace(/ò|ó|ọ|ỏ|õ|ô|ồ|ố|ộ|ổ|ỗ|ơ|ờ|ớ|ợ|ở|ỡ/g, "o");
        str = str.replace(/ù|ú|ụ|ủ|ũ|ư|ừ|ứ|ự|ử|ữ/g, "u");
        str = str.replace(/ỳ|ý|ỵ|ỷ|ỹ/g, "y");
        str = str.replace(/đ/g, "d");
        str = str.replace(/À|Á|Ạ|Ả|Ã|Â|Ầ|Ấ|Ậ|Ẩ|Ẫ|Ă|Ằ|Ắ|Ặ|Ẳ|Ẵ/g, "A");
        str = str.replace(/È|É|Ẹ|Ẻ|Ẽ|Ê|Ề|Ế|Ệ|Ể|Ễ/g, "E");
        str = str.replace(/Ì|Í|Ị|Ỉ|Ĩ/g, "I");
        str = str.replace(/Ò|Ó|Ọ|Ỏ|Õ|Ô|Ồ|Ố|Ộ|Ổ|Ỗ|Ơ|Ờ|Ớ|Ợ|Ở|Ỡ/g, "O");
        str = str.replace(/Ù|Ú|Ụ|Ủ|Ũ|Ư|Ừ|Ứ|Ự|Ử|Ữ/g, "U");
        str = str.replace(/Ỳ|Ý|Ỵ|Ỷ|Ỹ/g, "Y");
        str = str.replace(/Đ/g, "D");
        str = str.replace(/\u0300|\u0301|\u0303|\u0309|\u0323/g, "");
        str = str.replace(/\u02C6|\u0306|\u031B/g, "");
        return str;
      }
      function handleFilter() {
        const searchTerm = removeVietnameseTones(
          searchInput.value.toLowerCase(),
        );
        const filtered = provinces.filter((p) => {
          const provinceNameNoTone = removeVietnameseTones(
            p.name.toLowerCase(),
          );
          const matchSearch = provinceNameNoTone.includes(searchTerm);
          const matchRegion =
            currentFilter === "all" || p.region === currentFilter;
          return matchSearch && matchRegion;
        });
        if (filtered.length === 0) {
          grid.innerHTML = `
            <div style="grid-column: 1/-1; text-align: center; padding: 50px; color: #64748b;">
                <p style="font-size: 1.2rem;">🔍 Không tìm thấy kết quả phù hợp với "<strong>${searchInput.value}</strong>"</p>
            </div>`;
        } else {
          render(filtered);
        }
      }
      searchInput.addEventListener("input", handleFilter);
      document.querySelectorAll(".filter-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          document
            .querySelector(".filter-btn.active")
            .classList.remove("active");
          btn.classList.add("active");
          currentFilter = btn.dataset.region;
          handleFilter();
        });
      });
      function openModal(id) {
        const p = provinces.find((item) => item.id === id);
        document.getElementById("m-title").innerText = p.name;
        document.getElementById("m-img").src = p.image;
        document.getElementById("m-desc").innerText = p.description;
        document.getElementById("m-region").innerText = p.region;
        const linkElement = document.getElementById("m-link");
        linkElement.href = p.url || "#";
        linkElement.target = "_blank";
        linkElement.rel = "noopener noreferrer";
        const m = document.getElementById("modal");
        m.style.display = "flex";
        setTimeout(() => m.classList.add("active"), 10);
        document.body.style.overflow = "hidden";
      }
      function closeModal() {
        const m = document.getElementById("modal");
        m.classList.remove("active");
        setTimeout(() => {
          m.style.display = "none";
          document.body.style.overflow = "auto";
        }, 400);
      }
      render(provinces);
      function checkHashAndFilter() {
        const hash = window.location.hash;
        if (hash === "#mienbac") {
          activateFilter("Miền Bắc", "btn-mienbac");
        } else if (hash === "#mientrung") {
          activateFilter("Miền Trung", "btn-mientrung");
        } else if (hash === "#miennam") {
          activateFilter("Miền Nam", "btn-miennam");
        }
      }
      function activateFilter(regionName, buttonId) {
        document
          .querySelectorAll(".filter-btn")
          .forEach((btn) => btn.classList.remove("active"));
        const targetBtn = document.getElementById(buttonId);
        if (targetBtn) targetBtn.classList.add("active");
        currentFilter = regionName;
        handleFilter();
      }
      window.addEventListener("DOMContentLoaded", checkHashAndFilter);
      window.addEventListener("hashchange", checkHashAndFilter);
    </script>
